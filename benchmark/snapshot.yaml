# Comprehensive YAML benchmark snapshot
---
title: Benchmark Snapshot
version: 1

# ── Strings ──────────────────────────────────────────────────

strings:
  plain: Hello, World!
  empty: ''
  single_quoted: 'Hello, World!'
  single_quoted_empty: ''
  single_quoted_escape: "It's a test"
  double_quoted: 'Hello, World!'
  escape_tab: "col1\tcol2\tcol3"
  escape_newline: "line1\nline2\nline3"
  escape_cr: "before\r\nafter"
  escape_backslash: "C:\\Users\\admin\\docs"
  escape_quote: 'She said "hello"'
  escape_backspace: "back\bspace"
  escape_formfeed: "form\ffeed"
  escape_null: "null\0char"
  escape_bell: "bell\achar"
  escape_escape: "esc\echar"
  escape_slash: "path\/here"
  escape_vtab: "vtab\vhere"
  unicode_x: "\x48\x69"
  unicode_u: "\u0048\u0065\u006C\u006C\u006F"
  unicode_U: "\U00000048\U00000065\U0000006C\U0000006C\U0000006F"
  multiline_plain: >
    This is a long
    string that will be
    folded into a single line.
  literal_block: |
    first line
    second line
    third line
  literal_strip: |-
    first line
    second line
    third line
  literal_keep: |+
    first line
    second line
    third line
  folded_block: >
    Roses are red
    Violets are blue
    YAML is great
    And so are you
  folded_strip: >-
    The quick brown
    fox jumps over
    the lazy dog.
  folded_keep: >+
    first line
    second line
    third line
  literal_indent: |2
    indented content
    more indented content

# ── Integers ─────────────────────────────────────────────────

integers:
  positive: 42
  negative: -17
  zero: 0
  plus_zero: +0
  large: 1000000
  hex_lower: 0xdeadbeef
  hex_upper: 0xDEADBEEF
  octal: 0o755

# ── Floats ───────────────────────────────────────────────────

floats:
  pi: 3.14159265358979
  negative: -0.001
  exponent_pos: 5e+22
  exponent_neg: 1e-7
  exponent_both: 6.626e-34
  pos_inf: .inf
  neg_inf: -.inf
  pos_nan: .nan

# ── Booleans ─────────────────────────────────────────────────

booleans:
  'yes': true
  'no': false

# ── Null ─────────────────────────────────────────────────────

nulls:
  tilde: ~
  word: null
  empty:

# ── Date/Time ────────────────────────────────────────────────

dates:
  odt_zulu: 1979-05-27T07:32:00Z
  odt_offset_neg: 1979-05-27T07:32:00-05:00
  odt_offset_pos: 2024-12-25T12:00:00+09:00
  odt_frac: 1979-05-27T07:32:00.999999+00:00
  odt_space: 1979-05-27 07:32:00Z
  local_datetime: 1979-05-27T07:32:00
  local_datetime_frac: 1979-05-27T07:32:00.123
  local_date: 1979-05-27

# ── Sequences ────────────────────────────────────────────────

sequences:
  empty: []
  integers:
    - 1
    - 2
    - 3
    - 4
    - 5
  strings:
    - alpha
    - beta
    - gamma
    - delta
  floats:
    - 1.1
    - 2.2
    - 3.3
  booleans:
    - true
    - false
    - true
  nested:
    - [1, 2]
    - [3, 4]
    - [5, 6]
  deep_nested:
    - [[1, 2], [3, 4]]
    - [[5, 6], [7, 8]]
  flow: [one, two, three, four, five]
  mixed_types:
    - [1, 2]
    - [a, b]

# ── Mappings ─────────────────────────────────────────────────

server:
  host: localhost
  port: 8080
  enabled: true
  metadata:
    region: us-east-1
    zone: a
    tags: [web, production, v2]
    limits:
      max_connections: 1000
      timeout_ms: 30000
  tls:
    enabled: true
    cert_path: '/etc/ssl/certs/server.pem'
    key_path: '/etc/ssl/private/server.key'

# ── Inline/Flow Mappings ────────────────────────────────────

inline:
  point: { x: 1, y: 2, z: 3 }
  person: { name: Tom, age: 30, active: true }
  empty_table: {}
  nested_inline: { a: { b: c } }
  with_array: { tags: [a, b, c] }

# ── Anchors & Aliases ───────────────────────────────────────

anchors:
  defaults: &defaults
    adapter: postgres
    host: localhost
    port: 5432
  development:
    database: dev_db
    <<: *defaults
  production:
    database: prod_db
    <<: *defaults
  shared_value: &shared_val shared_content
  ref_value: *shared_val
  shared_list: &shared_list
    - one
    - two
    - three
  ref_list: *shared_list

# ── Array of Mappings (like TOML array of tables) ───────────

products:
  - name: Hammer
    sku: 738594937
    color: red
    price: 9.99
    in_stock: true
  - name: Nail
    sku: 284758393
    color: grey
    price: 0.05
    in_stock: true
  - name: Screwdriver
    sku: 473625193
    color: blue
    price: 12.50
    in_stock: false
  - name: Wrench
    sku: 109384756
    color: silver
    price: 15.00
    in_stock: true

# ── Nested Array of Mappings ────────────────────────────────

fruits:
  - name: apple
    varieties:
      - name: red delicious
        origin: USA
      - name: granny smith
        origin: Australia
      - name: fuji
        origin: Japan
  - name: banana
    varieties:
      - name: plantain
        origin: Central America
      - name: cavendish
        origin: Southeast Asia
  - name: cherry
    varieties:
      - name: bing
        origin: USA

# ── Complex Nested Structure ────────────────────────────────

database:
  server: '192.168.1.1'
  ports: [8001, 8002, 8003]
  connection_max: 5000
  connection_min: -2
  enabled: true
  credentials:
    username: admin
    password: s3cr3t
  options:
    retry_count: 3
    retry_delay_ms: 1000
    ssl: true
    pool_size: 10

# ── Edge Cases ──────────────────────────────────────────────

edge_cases:
  'unicode_key_τεστ': greek
  'key with spaces': works
  '': empty key
  'key.with.dots': dotted string key
  long_string: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.'

# ── Comments everywhere ─────────────────────────────────────

# This is a full-line comment
comments: # inline comment on mapping
  key1: value1 # inline comment on value
  key2: 42 # another inline comment
  key3: # comment before sequence
    - 1 # first
    - 2 # second
    - 3 # third

...
